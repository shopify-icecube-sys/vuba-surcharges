query CartTransformRunInput {
  cart {
    lines {
      id
      quantity

      fee: attribute(key: "_fee_amount") {
        value
      }

      cost {
        amountPerQuantity {
          amount
        }
      }

      merchandise {
        __typename
        ... on ProductVariant {
          id
          title
          product {
            handle
            inAnyCollection(ids: ["gid://shopify/Collection/446838440227"])
          }
        }
      }
    }
  }
  shop {
    metafield(namespace: "vuba_surcharges", key: "fee_variant_id") {
      value
    }
  }
}