query CartTransformRunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          title
          product {
            handle
            collections(first: 50) {
              nodes {
                id
              }
            }
          }
        }
      }
      parentRelationship {
        parent {
          merchandise {
            __typename
            ... on ProductVariant {
              product {
                collections(first: 50) {
                  nodes {
                    id
                  }
                }
              }
            }
          }
        }
      }
    }
  }
  shop {
    metafield(namespace: "vuba_surcharges", key: "fee_variant_id") {
      value
    }
  }
}
